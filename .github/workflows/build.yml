name: Build & Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'         # SemVer z prefiksem: v1.0, v1.0.1
      - '[0-9]*'     # PEP-440 bez prefiksu: 1.0, 1.0.1, 2.0
  workflow_dispatch:

permissions:
  contents: write

# Cancel any in-flight build for the same ref when a new one starts.
# Without this, force-pushing a tag twice in a row creates colliding runs
# that fight over the same release attachments and one of them dies at
# "Set up job".
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PyTorch (CPU-only, keeps CI fast)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      # `pillow` dorzucony jawnie, bo PyInstaller BUNDLE potrzebuje go żeby
      # przekonwertować `static/wp_logo.png` → tymczasowy `.icns` w trakcie
      # budowania bundla. Bez niego krok "Build .app" wywala się w
      # PyInstaller/building/icon.py: `ModuleNotFoundError: No module named 'PIL'`.
      - name: Install dependencies
        run: pip install --prefer-binary -r requirements.txt pyinstaller pillow

      # Deno binary — yt-dlp 2026+ wymaga JS runtime do YouTube nsig challenge.
      # Bez deno w bundlu user dostaje HTTP 403 na czystym macOS bez `brew install deno`.
      # .spec pakuje katalog `bin/` jako data → trafia do .app/Contents/Resources/bin/.
      - name: Download deno binary (macOS arm64)
        run: |
          mkdir -p bin
          DENO_VERSION="2.7.12"
          curl -L -o /tmp/deno.zip "https://github.com/denoland/deno/releases/download/v${DENO_VERSION}/deno-aarch64-apple-darwin.zip"
          unzip -o /tmp/deno.zip -d bin/
          chmod +x bin/deno
          rm /tmp/deno.zip
          bin/deno --version

      # Zero-dependency: wp_downloader.spec ma twardą asercję na obecność
      # bin/{ffmpeg,ffprobe,yt-dlp,deno} — bez tego kroku "Build .app" pada
      # na AssertionError zanim PyInstaller w ogóle ruszy. Mirror sekcji 2b
      # z scripts/build_local.sh (ten sam static ffmpeg z imageio-ffmpeg,
      # zapewnia h264_videotoolbox/libvpx-vp9/libopus/drawtext).
      - name: Fetch static ffmpeg/ffprobe/yt-dlp binaries (macOS arm64)
        run: |
          mkdir -p bin
          IMG_FF=$(python3 -c "import imageio_ffmpeg; print(imageio_ffmpeg.get_ffmpeg_exe())")
          cp "$IMG_FF" bin/ffmpeg
          chmod +x bin/ffmpeg

          curl -L --silent --show-error -o /tmp/ffprobe.gz \
            "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffprobe-darwin-arm64.gz"
          gunzip -f /tmp/ffprobe.gz && mv /tmp/ffprobe bin/ffprobe
          chmod +x bin/ffprobe

          curl -L --silent --show-error -o bin/yt-dlp \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x bin/yt-dlp

          for b in ffmpeg ffprobe yt-dlp; do
            echo "  $b: $(bin/$b -version 2>/dev/null || bin/$b --version 2>/dev/null | head -n1)"
          done
          _FILTERS=$(bin/ffmpeg -hide_banner -filters 2>/dev/null || true)
          case "$_FILTERS" in
            *" drawtext "*) echo "  ✓ bin/ffmpeg ma drawtext" ;;
            *) echo "::error::bin/ffmpeg bez drawtext"; exit 1 ;;
          esac

      # Używamy .spec zamiast build_app.py, żeby info_plist (CFBundleName,
      # CFBundleShortVersionString, LSMinimumSystemVersion, NSCamera/Microphone
      # usage description) wszedł do docelowego .app. Bez tych kluczy bundle
      # crashuje na macOS 26+ w __CFCheckCFInfoPACSignature → CFBundleCopyBundleURL
      # podczas dlopen QtCore.abi3.so (sprawdzone realnym crash logiem z M5/macOS26).
      - name: Build .app
        run: pyinstaller wp_downloader.spec --noconfirm

      # QtWebEngine ładuje V8 z runtime JIT. Bez ad-hoc codesignu z
      # entitlements (allow-jit + allow-unsigned-executable-memory +
      # disable-library-validation) Hardened Runtime na macOS 14/15/26
      # killuje proces helper natychmiast po starcie.
      - name: Ad-hoc codesign with entitlements
        run: |
          codesign --force --deep --sign - \
            --entitlements build/entitlements.plist \
            --options runtime \
            dist/WP_Downloader.app
          codesign --verify --verbose dist/WP_Downloader.app

      # Sanity check — gdyby `collect-all=PyQt6` przegapił helpera,
      # app nie ma jak wystartować WebView. Lepiej zakończyć budowę
      # tutaj niż wysyłać uszkodzony bundle na release.
      - name: Verify QtWebEngineProcess.app present
        run: |
          if [ -z "$(find dist/WP_Downloader.app -name 'QtWebEngineProcess.app' -print -quit)" ]; then
            echo "::error::QtWebEngineProcess.app missing from bundle"
            exit 1
          fi
          find dist/WP_Downloader.app -name 'QtWebEngineProcess.app' -print

      # Zdejmij quarantine, żeby user po `open dist/WP_Downloader.app`
      # nie musiał klikać przez Gatekeeper'a / "uszkodzony plik".
      - name: Strip quarantine xattr from .app
        run: xattr -dr com.apple.quarantine dist/WP_Downloader.app || true

      # DMG drag&drop pattern — klasyczny wzorzec instalacji macOS:
      # użytkownik widzi w DMG ikonę .app obok ikony /Applications,
      # przeciąga z lewa na prawo. Pliki "wystawione" w DMG (nie sam .app
      # rozpakowany) eliminuje problem "uszkodzony plik" gdy user uruchamia
      # bezpośrednio z DMG (Gatekeeper blokuje read-only volume executables).
      # Bez Apple Developer ID Gatekeeper nadal pokaże ostrzeżenie przy
      # pierwszym uruchomieniu — user musi prawym→Otwórz raz.
      - name: Package DMG (drag&drop pattern)
        run: |
          DMG_STAGING="dist/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "dist/WP_Downloader.app" "$DMG_STAGING/"
          # Symlink do /Applications obok .app — klasyczny drag&drop layout
          ln -s /Applications "$DMG_STAGING/Applications"
          # Re-chmod executable (cp -R potrafi gubić +x na niektórych wolumenach)
          chmod +x "$DMG_STAGING/WP_Downloader.app/Contents/MacOS/WP_Downloader"
          # Strip quarantine po cp -R (może propagować z source)
          xattr -dr com.apple.quarantine "$DMG_STAGING/WP_Downloader.app" || true
          # UDZO = compressed read-only, fs HFS+ dla max kompatybilności
          hdiutil create \
            -volname "WP Downloader" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            -fs HFS+ \
            "dist/WP_Downloader_macOS.dmg"

      - name: Strip quarantine xattr from DMG
        run: xattr -dr com.apple.quarantine dist/WP_Downloader_macOS.dmg || true

      # Portable — zip bezpośredni .app, bez montowania DMG/instalacji do
      # /Applications. Mirror dual-build patternu z jobu Windows (installer +
      # _Windows.zip). `ditto` (nie `zip -r`) zachowuje resource forks /
      # extended attributes macOS wewnątrz .app bundla.
      - name: Package portable ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/WP_Downloader.app dist/WP_Downloader_macOS_PORTABLE.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WP_Downloader_macOS.dmg
            dist/WP_Downloader_macOS_PORTABLE.zip
          generate_release_notes: true
          name: WP Downloader ${{ github.ref_name }}
          fail_on_unmatched_files: true

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PyTorch (CPU-only, keeps CI fast)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      # Deno binary (Win x64) — yt-dlp 2026+ wymaga JS runtime do YouTube nsig.
      # Bez tego user na czystym Windowsie dostaje HTTP 403 ("JS runtimes: none"
      # w logu). .spec pakuje katalog `bin/` jako data → trafia obok exe.
      - name: Download deno binary (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $DENO_VERSION = "2.7.12"
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/download/v$DENO_VERSION/deno-x86_64-pc-windows-msvc.zip" -OutFile deno.zip
          Expand-Archive -Path deno.zip -DestinationPath bin -Force
          Remove-Item deno.zip
          .\bin\deno.exe --version

      # Zero-dependency: wp_downloader.spec ma twardą asercję na obecność
      # bin/{ffmpeg,ffprobe,yt-dlp,deno}.exe — bez tego kroku "Build EXE folder"
      # pada na AssertionError zanim PyInstaller w ogóle ruszy. GPL build
      # (BtbN/FFmpeg-Builds) ma pełny drawtext/libvpx/libopus, ten sam
      # publisher już używany jako fallback w main.py._download_ffmpeg_logic.
      - name: Fetch static ffmpeg/ffprobe/yt-dlp binaries (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffDir = Get-ChildItem -Path ffmpeg_extract -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" bin\ffmpeg.exe
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" bin\ffprobe.exe
          Remove-Item ffmpeg.zip
          Remove-Item ffmpeg_extract -Recurse -Force

          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile bin\yt-dlp.exe

          .\bin\ffmpeg.exe -version
          .\bin\ffprobe.exe -version
          $filters = & .\bin\ffmpeg.exe -hide_banner -filters 2>$null | Out-String
          if ($filters -notmatch " drawtext ") {
            Write-Error "bin/ffmpeg.exe bez drawtext"
            exit 1
          }
          Write-Host "  OK bin/ffmpeg.exe ma drawtext"

      # Multi-res ICO (16/32/48/64/128/256) — Inno Setup używa najmniejszej
      # wersji do icon overlay w menu Start, większych do "Add/Remove Programs".
      - name: Build multi-res ICO
        run: |
          python -c "from PIL import Image; img = Image.open('static/wp_logo.png').convert('RGBA'); img.save('static/wp_logo.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      # WAŻNE: zamiast python build_app.py używamy .spec — `build_app.py` ignoruje
      # nasz `wp_downloader.spec` (który pakuje bin/deno.exe + info_plist na mac).
      # Build z .spec konsystentnie pakuje deno do dist\WP_Downloader\bin\deno.exe.
      - name: Build EXE folder
        run: pyinstaller wp_downloader.spec --noconfirm

      - name: Package ZIP
        run: Compress-Archive -Path dist\WP_Downloader -DestinationPath dist\WP_Downloader_Windows.zip

      # Inno Setup installer: instaluje do %LOCALAPPDATA%\Programs\WP_Downloader\
      # (user-scope, bez UAC), ikona w menu Start, opcjonalnie pulpit.
      # SmartScreen wciąż ostrzega na pierwszym uruchomieniu (brak EV cert),
      # ale logi siedzą już w %APPDATA%\WP_Downloader\logs\ — install dir
      # może być read-only.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss'
        shell: cmd

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WP_Downloader_Windows.zip
            Output/WP_Downloader_Setup.exe
          generate_release_notes: true
          name: WP Downloader ${{ github.ref_name }}
          fail_on_unmatched_files: true
